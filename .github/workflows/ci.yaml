name: CI

on:
  push:
    branches: [main, master]
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Gate: require maintainer approval for external contributors ──
  gate-external-prs:
    name: External PR approval gate
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    permissions:
      pull-requests: read
      issues: read
    steps:
      - name: Check collaborator status or ci-approved label
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"

          # Push events always pass through
          if [ -z "$AUTHOR" ]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check collaborator status via API (204 = yes, 404 = no)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/${REPO_OWNER}/lunar-ics/collaborators/$AUTHOR 2>/dev/null || echo "0")

          if [ "$HTTP_CODE" = "204" ]; then
            echo "approved=true (collaborator)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for ci-approved label on the PR
          HAS_LABEL=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/${REPO_OWNER}/lunar-ics/issues/$PR_NUMBER 2>/dev/null |
            python3 -c "import sys,json; labels=[t['name'] for t in json.load(sys.stdin).get('labels',[])]; print('yes' if 'ci-approved' in labels else 'no')" 2>/dev/null || echo "no")

          if [ "$HAS_LABEL" = "yes" ]; then
            echo "approved=true (ci-approved label)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Not approved — fail the gate
          echo "approved=false" >> "$GITHUB_OUTPUT"

      - name: Post approval request for external PRs
        if: steps.check.outputs.approved == 'false' && github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          gh pr comment "$PR_NUMBER" \
            --repo "${REPO_OWNER}/lunar-ics" \
            --body "**CI is paused pending maintainer approval.**

External contributors require a \`ci-approved\` label before CI workflows run.

A project maintainer should add the \`ci-approved\` label to this pull request."

  # ── Status comment when gate blocks ──
  mark-skipped:
    name: Skipped (awaiting approval)
    needs: [gate-external-prs]
    if: always() && needs.gate-external-prs.outputs.approved == 'false'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment CI status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "${REPO_OWNER}/lunar-ics" \
            --body "⏳ **CI checks are waiting for maintainer approval.**\n\nA maintainer needs to add the \`ci-approved\` label to this PR.\n\n*This is an automated status update.*"

  # ── Lint ──
  lint:
    name: Lint (go vet)
    runs-on: ubuntu-latest
    needs: [gate-external-prs]
    if: always() && (needs.gate-external-prs.result == 'success' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run go vet
        run: go vet ./...

  # ── Tests ──
  test:
    name: Tests (go test)
    runs-on: ubuntu-latest
    needs: [gate-external-prs]
    if: always() && (needs.gate-external-prs.result == 'success' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test -v -count=1 -race ./...

  # ── Build linux/amd64 ──
  build-amd64:
    name: Build (linux/amd64)
    runs-on: ubuntu-latest
    needs: [gate-external-prs]
    if: always() && (needs.gate-external-prs.result == 'success' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binary (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -o lunar-ics-amd64 .

      - name: Upload artifact (amd64)
        uses: actions/upload-artifact@v4
        with:
          name: lunar-ics-linux-amd64
          path: lunar-ics-amd64
          retention-days: 1

  # ── Build linux/arm64 ──
  build-arm64:
    name: Build (linux/arm64)
    runs-on: ubuntu-latest
    needs: [gate-external-prs]
    if: always() && (needs.gate-external-prs.result == 'success' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binary (linux/arm64)
        env:
          GOOS: linux
          GOARCH: arm64
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -o lunar-ics-arm64 .

      - name: Upload artifact (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: lunar-ics-linux-arm64
          path: lunar-ics-arm64
          retention-days: 1

  # ── Run check: start binary and verify HTTP response ──
  run-check-amd64:
    name: Run check (linux/amd64)
    runs-on: ubuntu-latest
    needs: [gate-external-prs, build-amd64]
    if: always() && (needs.gate-external-prs.result == 'success' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build binary (linux/amd64) for run-check
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -o lunar-ics-run .

      - name: Run binary and verify HTTP response
        timeout-minutes: 2
        run: |
          ./lunar-ics-run --addr :9000 &
          PID=$!
          sleep 3

          # Verify HTTP endpoint responds with VCALENDAR content
          HEADER=$(curl -sf http://localhost:9000/ || echo "FAIL")
          if [ "$HEADER" = "FAIL" ]; then
            echo "::error::HTTP request failed — binary may not be serving correctly"
            kill $PID 2>/dev/null; wait $PID 2>/dev/null || true
            exit 1
          fi

          if ! echo "$HEADER" | grep -q "BEGIN:VCALENDAR"; then
            echo "::error::Response does not contain valid ICS VCALENDAR header"
            kill $PID 2>/dev/null; wait $PID 2>/dev/null || true
            exit 1
          fi

          # Graceful shutdown
          kill $PID
          wait $PID 2>/dev/null || true
          echo "Run check passed — binary starts and serves ICS successfully"

  # ── Build and push debug container image (every commit/PR) ──
  build-debug-image:
    name: Debug image (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    needs: [gate-external-prs]
    if: always() && (needs.gate-external-prs.result == 'success' || github.event_name == 'push')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-latest-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta (debug)
        id: debug-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=debug-,suffix=-${{ matrix.arch }}
            type=ref,event=branch,prefix=debug-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (debug)
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push debug image (${{ matrix.arch }})
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ${{ steps.debug-meta.outputs.tags }}
          labels: |
            org.opencontainers.image.description=Debug image for lunar-ics (non-root, distroless)
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            debug=true
          build-args: |
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
